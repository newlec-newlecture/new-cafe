<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 - 대시보드 | 카페</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <nav class="admin-nav">
    <div class="container">
      <a href="index.html" class="nav-brand">☕ 카페 관리자</a>
      <ul class="nav-links">
        <li class="active"><a href="index.html">대시보드</a></li>
        <li><a href="menus/list.html">메뉴 관리</a></li>
        <li><a href="orders/list.html">주문 관리</a></li>
      </ul>
    </div>
  </nav>

  <main class="container page-content">
    <h1 class="page-title">대시보드</h1>

    <div class="stats-grid">
      <div class="stat-card glass-card">
        <p class="stat-label">총 메뉴</p>
        <p class="stat-value" id="totalMenus">0</p>
      </div>
      <div class="stat-card glass-card">
        <p class="stat-label">판매중</p>
        <p class="stat-value" id="activeMenus">0</p>
      </div>
      <div class="stat-card glass-card">
        <p class="stat-label">총 주문</p>
        <p class="stat-value" id="totalOrders">0</p>
      </div>
      <div class="stat-card glass-card">
        <p class="stat-label">대기 주문</p>
        <p class="stat-value" id="pendingOrders">0</p>
      </div>
    </div>

    <section class="section">
      <div class="section-header">
        <h2>최근 주문</h2>
        <a href="orders/list.html" class="btn btn-secondary btn-sm">전체 주문 관리 →</a>
      </div>
      <div id="recentOrders">
        <!-- JS로 렌더링 -->
      </div>
      <div id="noOrders" class="empty-state" style="display:none;">
        <p>아직 주문 내역이 없습니다.</p>
      </div>
    </section>

    <section class="section">
      <div class="section-header">
        <h2>카테고리</h2>
        <a href="menus/list.html" class="btn btn-secondary btn-sm">메뉴 관리 →</a>
      </div>
      <div class="category-summary" id="categorySummary">
        <!-- JS로 렌더링 -->
      </div>
    </section>
  </main>

  <script src="../js/data.js"></script>
  <script src="../js/utils.js"></script>
  <script src="index.js"></script>
</body>
</html>
